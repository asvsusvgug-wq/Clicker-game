<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💰 Clicker Game</h1>
        <div class="stats">
            <p id="score">Score: 0</p>
            <p id="per-second">Per Second: 0</p>
        </div>
        
        <button id="click-button" class="click-btn">Click Me!</button>
        
        <div class="upgrades">
            <h2>Upgrades</h2>
            <div id="upgrades-list" class="upgrades-list"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
